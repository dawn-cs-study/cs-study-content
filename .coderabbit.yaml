language: "ko-KR"
tone_instructions: "friendly but precise"   # 리뷰/채팅 톤 지정.

early_access: false
enable_free_tier: true           # 무료 플랜 활성화 여부. true로 두면 Free Tier에서도 동작

reviews:
  profile: "assertive"
  high_level_summary: true       # 리뷰에 변경 요약 포함 여부
  commit_status: true            # PR 상태에 "리뷰 통과/실패" 배지 표시 여부
  poem: false
  auto_review:
    enabled: true                # PR 생성 시 자동으로 리뷰 시작 여부 (true/false)
    drafts: false                # Draft PR도 자동 리뷰할지 여부 (true/false)
  tools: # 린트/보안 툴 연동
    gitleaks:
      enabled: true              # GitLeaks(비밀키, 민감정보 탐지) 활성화 여부
  path_filters:
    - "!**/*.bin"                  # 리뷰에서 제외할 파일 패턴. 여기서는 모든 .bin 파일 제외
    - "src/**"                     # 리뷰에 포함할 파일 패턴. 여기서는 src 디렉토리만 리뷰